services:
  - type: web
    name: net-to-seller-calculator
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: supabase_nts_api
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ATTOM_API
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: BATCHDATA_API_KEY
        sync: false
